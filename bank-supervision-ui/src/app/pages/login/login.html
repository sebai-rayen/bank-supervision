<div class="min-vh-100 d-flex align-items-center justify-content-center position-relative login-bg">
  <div class="position-absolute top-0 start-0 w-100 h-100 login-overlay"></div>

  <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5 login-card position-relative">
    <div class="text-center mb-3">
      <img src="assets/logobank.png" alt="Logo" style="height: 48px;" class="mb-2" />
      <h2 class="fw-bold text-white mb-0">Se connecter</h2>
      <p class="login-subtitle mt-2 mb-0">Accédez à votre espace sécurisé</p>
    </div>

    <form class="mt-4" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <input
          type="email"
          class="form-control form-control-lg rounded-3"
          placeholder="Adresse e-mail"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
        />
      </div>

      <div class="mb-3 position-relative">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="form-control form-control-lg rounded-3 pe-5"
          placeholder="Mot de passe"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
        />

        <button
          type="button"
          (click)="togglePassword()"
          class="btn btn-link position-absolute top-50 end-0 translate-middle-y me-2 p-0 eye-btn">
          <i
            class="bi"
            [class.bi-eye]="!showPassword"
            [class.bi-eye-slash]="showPassword">
          </i>
        </button>
      </div>

      <div class="d-flex align-items-center justify-content-between gap-2 mb-4 flex-wrap">
        <div class="d-flex align-items-center gap-2">
          <input
            class="form-check-input mt-0"
            type="checkbox"
            id="remember"
            [(ngModel)]="rememberMe"
            name="rememberMe"
          />
          <label class="form-check-label text-white-50" for="remember">
            Se souvenir de moi
          </label>
        </div>

        <a routerLink="/register" class="text-white-50 text-decoration-none small-link">
          Créer un compte
        </a>
      </div>

      <button type="submit" class="btn login-btn btn-lg w-100 rounded-3">
        Se connecter
      </button>

      <div *ngIf="error" class="text-danger text-center mt-3">
        {{ error }}
      </div>

      <div class="text-center mt-3">
        <a href="javascript:void(0)" class="text-white-50 text-decoration-none small-link">
          Mot de passe oublié ?
        </a>
      </div>
    </form>
  </div>
</div>

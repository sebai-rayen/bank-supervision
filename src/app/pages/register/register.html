<div class="min-vh-100 d-flex align-items-center justify-content-center position-relative register-bg">
  <div class="position-absolute top-0 start-0 w-100 h-100 register-overlay"></div>

  <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5 register-card position-relative">
    <div class="text-center mb-3">
      <img src="assets/logobank.png" alt="Logo" class="mb-2 logo-img">
      <h2 class="fw-bold text-white mb-0">Créer un compte</h2>
      <p class="register-subtitle mt-2 mb-0">Créez votre compte utilisateur</p>
    </div>

    <form class="mt-4" (ngSubmit)="onRegister()">
      <div class="mb-3">
        <input
          type="text"
          class="form-control form-control-lg rounded-3"
          placeholder="Nom complet"
          [(ngModel)]="name"
          name="name"
          required>
      </div>

      <div class="mb-3">
        <input
          type="email"
          class="form-control form-control-lg rounded-3"
          placeholder="Adresse e-mail"
          [(ngModel)]="email"
          name="email"
          required>
      </div>

      <div class="mb-3 position-relative">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="form-control form-control-lg rounded-3 pe-5"
          placeholder="Mot de passe"
          [(ngModel)]="password"
          name="password"
          required>

        <button
          type="button"
          (click)="togglePassword()"
          class="btn btn-link position-absolute top-50 end-0 translate-middle-y me-2 p-0 eye-btn">
          <i
            class="bi"
            [class.bi-eye]="!showPassword"
            [class.bi-eye-slash]="showPassword">
          </i>
        </button>
      </div>

      <div class="mb-3 position-relative">
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          class="form-control form-control-lg rounded-3 pe-5"
          placeholder="Confirmer le mot de passe"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required>

        <button
          type="button"
          (click)="toggleConfirmPassword()"
          class="btn btn-link position-absolute top-50 end-0 translate-middle-y me-2 p-0 eye-btn">
          <i
            class="bi"
            [class.bi-eye]="!showConfirmPassword"
            [class.bi-eye-slash]="showConfirmPassword">
          </i>
        </button>
      </div>

      <button type="submit" class="btn register-btn btn-lg w-100 rounded-3">
        Créer un compte
      </button>

      <div *ngIf="error" class="text-danger text-center mt-3">
        {{ error }}
      </div>

      <div *ngIf="success" class="text-success text-center mt-3">
        {{ success }}
      </div>

      <div class="text-center mt-4">
        <span class="text-white-50">Vous avez déjà un compte ? </span>
        <a routerLink="/login" class="login-link text-decoration-none">
          Se connecter
        </a>
      </div>
    </form>
  </div>
</div>

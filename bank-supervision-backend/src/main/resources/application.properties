server.port=8081
spring.datasource.url=jdbc:postgresql://localhost:5432/server_db
spring.datasource.username=postgres
spring.datasource.password=rayen
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.security.jwt.access-token-expiration=900000
app.security.jwt.refresh-token-expiration=604800000

app.alert.mail.enabled=${APP_ALERT_MAIL_ENABLED:false}
app.alert.mail.from=${APP_ALERT_MAIL_FROM:no-reply@bank-supervision.local}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
